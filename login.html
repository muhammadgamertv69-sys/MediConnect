<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-display {
            font-family: 'Poppins', sans-serif;
        }

        .auth-bg {
            background: radial-gradient(circle at 20% 20%, rgba(0,123,255,0.15), rgba(40,167,69,0.08));
        }
    </style>
</head>
<body class="auth-bg min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
        <div class="text-center lg:text-left">
            <div class="flex items-center justify-center lg:justify-start mb-6">
                <img src="resources/logo.png" alt="MediConnect" class="h-10 w-10 mr-3">
                <span class="font-display font-semibold text-2xl text-gray-900">MediConnect</span>
            </div>
            <h1 class="font-display text-4xl font-bold text-gray-900 mb-4">Welcome Back</h1>
            <p class="text-gray-600 mb-8">
                Sign in to manage your appointments, health records, and access MediLab AI insights.
            </p>
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h2 class="font-display text-xl font-semibold text-gray-900 mb-4">Why Sign In?</h2>
                <ul class="space-y-3 text-gray-600">
                    <li>• Save preferences and doctors</li>
                    <li>• Access appointment history</li>
                    <li>• Receive AI-generated prep checklists</li>
                </ul>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-display text-2xl font-semibold text-gray-900">Sign In</h2>
                <span class="text-sm text-indigo-700 font-semibold whitespace-nowrap">Unwired Demo</span>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <button type="submit" class="w-full btn-primary text-white py-3 rounded-lg font-semibold">
                    Sign In
                </button>
            </form>
            <div class="mt-6 border-t border-gray-200 pt-6">
                <h3 class="font-display text-lg font-semibold text-gray-900 mb-3">Create an Account</h3>
                <form id="signup-form" class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <input type="text" placeholder="First Name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <input type="text" placeholder="Last Name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <input type="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <input type="password" placeholder="Create Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button type="submit" class="w-full border border-blue-600 text-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-50 transition-colors">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="env.js"></script>
    <script src="main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            window.location.href = 'index.html';
        });

        document.getElementById('signup-form').addEventListener('submit', function(event) {
            event.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
